services:
  - type: web
    name: stockflow-rd
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://stockflow-rd.onrender.com
      - key: FRONTEND_URL
        value: https://stockflow-rd.onrender.com

databases:
  - name: stockflow-db
    databaseName: stockflow
    plan: free
